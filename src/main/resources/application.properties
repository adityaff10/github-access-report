spring.application.name=github-access-report
server.port=9090

# GitHub Token - loaded from environment variable
github.token=${GITHUB_TOKEN}

# GitHub API base URL
github.api.base-url=https://api.github.com

# How many items per page
github.api.page-size=100

# How many parallel threads for API calls
github.api.thread-pool-size=20

# Logging
logging.level.com.cloudeagle=INFO

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs